      consul:
        condition: service_healthy
      log:
        condition: service_started
    healthcheck:
      test: "wget --spider http://localhost:8080/actuator/health || exit 1"
      interval: 30s
      timeout: 5s
      retries: 20
    logging:
      <<: *logging

